[General]
vid_renderer = qt_software

[Machine]
machine = asus3863364k
cpu_family = i386dx
cpu_speed = 33333333
cpu_multi = 1
cpu_use_dynarec = 0
fpu_type = 1
mem_size = 4096

[Video]
gfxcard = vga

[Input devices]
mouse_type = none

[Storage controllers]
fdc = internal
hdc_1 = ide_isa

[Floppy and CD-ROM drives]
fdd_01_type = 35_2hd
fdd_01_fn = Disk1.img
fdd_02_type = none

[Hard disks]
hdd_01_parameters = 63, 16, 260, 0, ide
hdd_01_ide_channel = 0:0
hdd_01_fn = liza-hdd.img

[Ports (COM & LPT)]
serial1_passthrough_enabled = 1

[Serial Passthrough Device #1]
mode = 1
named_pipe = \\.\pipe\liza-dos
data_bits = 8
stop_bits = 1
baudrate = 115200
