name: check

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  build-dos:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Open Watcom
        run: |
          $url = "https://github.com/open-watcom/open-watcom-v2/releases/download/v2.0/open-watcom-v2-windows-x64.exe"
          $out = "$env:TEMP\ow_installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          & $out /S /D=C:\WATCOM16
          echo "C:\WATCOM16\binnt64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\WATCOM16\binnt" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build DOS client
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/build_dos.ps1
      - name: Upload DOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liza-dos
          path: |
            dos/LIZA.EXE
            dos/LIZA-DOS.img
          retention-days: 7